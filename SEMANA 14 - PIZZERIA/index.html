<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Napoli Pizza. La mejor pizza artesanal cocinada en horno de leña. Ubicada en Los Altos Mirandinos. ¡Haz tu pedido ahora!"
    />
    <meta
      name="keywords"
      content="pizza, artesanal, restaurante, comida italiana, delivery, Los Altos Mirandinos"
    />
    <meta name="author" content="Javier" />
    <title>Napoli Pizza | Auténtica Pizza Artesanal</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="pizz-header">
      <div class="pizz-header__logo">NAPOLI PIZZA</div>

      <!-- Botón de menú -->
      <button
        class="pizz-header__menu-btn"
        aria-label="Abrir menú"
        aria-expanded="false"
      >
        ☰
      </button>

      <!-- Menú de navegación -->
      <nav class="pizz-nav" id="main-nav">
        <!-- Lista de elementos en menú -->
        <ul class="pizz-nav__list">
          <!-- Item de la lista del menú de nevegación -->
          <li class="pizz-nav__item">
            <a href="#menu" class="pizz-nav__link">Nuestro Menú</a>
          </li>
          <li class="pizz-nav__item">
            <a href="#historia" class="pizz-nav__link">Historia</a>
          </li>
          <li class="pizz-nav__item">
            <a href="#ubicacion" class="pizz-nav__link">Franquicias</a>
          </li>
          <li class="pizz-nav__item">
            <a href="#contacto" class="pizz-nav__link">Contacto</a>
          </li>
          <li class="pizz-nav__item pizz-nav__item--social">
            <a href="#" class="pizz-nav__link">IG</a>
            <a href="#" class="pizz-nav__link">FB</a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- Main -->
    <main class="pizz-main"></main>

    <!-- Footer -->
    <footer class="pizz-footer">
      <p>&copy; 2026 Napoli Pizza. Todos los derechos reservados.</p>
    </footer>

    <script src="js/app.js" defer></script>
  </body>
</html>
