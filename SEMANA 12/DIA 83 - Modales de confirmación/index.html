<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="dangerregular_106328.png" type="image/x-icon">
    <title>Día 83</title>
  </head>
  <body>
    <div
      class="modal-confirm"
      id="confirm-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div class="modal-confirm__box">
        <div class="modal-confirm__header">
          <h3 class="modal-confirm__title" id="modal-title">
            ⚠️ ¿Confirmar Acción Crítica?
          </h3>
        </div>

        <div class="modal-confirm__body">
          <p class="modal-confirm__text">
            Está a punto de reiniciar el Nodo Central de la red. Esta acción
            desconectará temporalmente a los usuarios de la zona. ¿Desea
            continuar?
          </p>
        </div>

        <div class="modal-confirm__actions">
          <button class="btn btn--secondary" id="btn-cancel">Cancelar</button>
          <button class="btn btn--danger" id="btn-proceed">
            Reiniciar Nodo
          </button>
        </div>
      </div>
    </div>

    <div class="boton">
      <button class="btn btn--danger-action" id="btn-trigger-action">
        Eliminar Nodo
      </button>
    </div>

    
    <script src="app.js" defer></script>
  </body>
</html>
