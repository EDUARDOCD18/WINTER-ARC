<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>ISP E-Commerce | Plataforma de Ventas</title>
  </head>
  <body>
    <!-- CONTENEDOR -->
    <div class="ecom-app">
      <header class="ecom-header">
        <div class="ecom-header__logo">ISP STORE</div>
      </header>

      <main class="ecom-main">
        <aside class="ecom-sidebar">
          <h3 class="ecom-sidebar__title">Categorías</h3>
          <nav class="ecom-nav">
            <ul class="ecom-nav__list">
              <li class="ecom-nav__item ecom-nav__item--has-submenu">
                <button class="ecom-nav__link">
                  Electrónica <span>▾</span>
                </button>
                <ul class="ecom-submenu">
                  <li class="ecom-submenu__item">
                    <a href="#">Smartphones</a>
                  </li>
                  <li class="ecom-submenu__item"><a href="#">Laptops</a></li>
                </ul>
              </li>
            </ul>
          </nav>

          <hr class="ecom-sidebar__divider" />

          <div class="ecom-filters">
            <h3 class="ecom-sidebar__title ecom-filter__title">Filtros</h3>
            <div class="ecom-filter-group">
              <input
                type="text"
                id="search-input"
                class="ecom-filter__input"
                placeholder="Buscar producto..."
              />
            </div>
            <div class="ecom-filter-group">
              <label class="ecom-filter__label">
                <input type="checkbox" id="stock-filter" /> Solo en stock
              </label>
            </div>
          </div>
        </aside>

        <div class="ecom-view">
          <section class="ecom-catalog" id="catalog-view">
            <div class="skeleton-card" id="skeleton-container">
              <div class="skeleton-card__img"></div>
              <div class="skeleton-card__body">
                <div class="skeleton-card__line"></div>
                <div
                  class="skeleton-card__line skeleton-card__line--short"
                ></div>
              </div>
            </div>

            <article class="product-card" data-price="99" data-in-stock="true">
              <div class="product-card__img-container">
                <img
                  src="./img/XC220.jpg"
                  alt="Producto"
                  class="product-card__img"
                />
              </div>
              <div class="product-card__body">
                <h3 class="product-card__title">
                  TP-LINK XC220-G3 (ONT/ROUTER)
                </h3>
                <span class="product-card__price">$99.00</span>
                <button class="product-card__btn">Agregar al carrito</button>
              </div>
            </article>
          </section>

          <section class="product-details">
            <h2 class="product-details__main-title">Detalles del XC220-G3</h2>
            <div class="product-details__item">
              <button class="product-details__header" aria-expanded="false">
                Descripción <span>▾</span>
              </button>
              <div class="product-details__content">
                <p>
                  ONU/Router de alta gama diseñado para tráfico masivo en redes
                  locales...
                </p>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- MODAL -->
    <button
      id="open-checkout-btn"
      class="product-card__btn"
    >
      Abrir Checkout
    </button>

    <div
      class="ecom-modal"
      id="checkout-modal"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
    >
      <div class="ecom-modal__overlay" id="modal-overlay" tabindex="-1"></div>

      <div class="ecom-modal__content">
        <button
          class="ecom-modal__close"
          id="close-modal-btn"
          aria-label="Cerrar modal"
        >
          ✖
        </button>

        <h2 class="ecom-modal__title">Confirmar Compra</h2>

        <form class="ecom-form" id="checkout-form" novalidate>
          <div class="ecom-form__group">
            <label for="user-name" class="ecom-form__label"
              >Nombre completo</label
            >
            <input
              type="text"
              id="user-name"
              class="ecom-form__input"
              required
              pattern="[a-zA-Z\s]+"
              placeholder="Ej. Juan Pérez"
            />
            <span class="ecom-form__error" id="name-error"></span>
          </div>

          <div class="ecom-form__group">
            <label for="credit-card" class="ecom-form__label"
              >Número de Tarjeta (Ficticio)</label
            >
            <input
              type="text"
              id="credit-card"
              class="ecom-form__input"
              required
              maxlength="16"
              pattern="\d{16}"
              placeholder="1234567812345678"
            />
            <span class="ecom-form__error" id="card-error"></span>
          </div>

          <button type="submit" class="ecom-form__submit">
            Procesar Pago Seguro
          </button>
        </form>
      </div>
    </div>
    <script src="./js/app.js" defer></script>
  </body>
</html>
